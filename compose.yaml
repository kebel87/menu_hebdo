services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.12.0
    restart: unless-stopped
    ports:
      - "4191:4180"
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_CLIENT_ID: "${OAUTH2_PROXY_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET: "${OAUTH2_PROXY_CLIENT_SECRET}"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://auth.kb87.net"
      OAUTH2_PROXY_REDIRECT_URL: "https://menu.kb87.net/oauth2/callback"
      OAUTH2_PROXY_UPSTREAMS: "http://menu-hebdo:8000"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_COOKIE_NAME: "_oauth2_proxy_menu"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_SKIP_AUTH_ROUTES: "^/manifest.webmanifest$,^/sw.js$,^/icons/.*"
    networks:
      - default

  menu-hebdo:
    image: "${INVENTORY_IMAGE:-ghcr.io/kebel87/menu_hebdo:latest}"
    restart: unless-stopped
    ports:
      - "8091:8000"
    environment:
      AUTH_MODE: "${AUTH_MODE:-proxy}"
      MEALIE_URL: "https://mealie.kb87.net"
      MEALIE_API_KEY: "${MEALIE_API_KEY}"
      INVENTAIRE_API_URL: "http://inventaire-familial:8000"
      SERVICE_API_KEY: "${SERVICE_API_KEY}"
      CALENDAR_API_URL: "${CALENDAR_API_URL:-https://calendrier.kb87.net}"
      CALENDAR_API_TOKEN: "${CALENDAR_API_TOKEN:-}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY}"
      VAPID_CONTACT_EMAIL: "kevin.belleau@gmail.com"
      MENU_DATA_DIR: "/app/data"
      BACKUP_DB_PATH: "${BACKUP_DB_PATH:-/app/data/menu.db}"
      BACKUP_DIR: "${BACKUP_DIR:-/app/data/backups}"
      BACKUP_KEEP_LOCAL: "${BACKUP_KEEP_LOCAL:-14}"
      BACKUP_RCLONE_DEST: "${BACKUP_RCLONE_DEST:-gdrive-crypt:}"
      RCLONE_CONFIG: "${RCLONE_CONFIG:-/config/rclone/rclone.conf}"
    volumes:
      - ./data:/app/data
      - ./rclone:/config/rclone
    networks:
      - default
      - inventaire-net

networks:
  default:
    name: menu_hebdo_default
  inventaire-net:
    external: true
    name: inventaire_familial_default
